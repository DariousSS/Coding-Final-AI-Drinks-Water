<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Drinks Water</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        overflow: hidden;
        background: #fafafa;
      }

      #input-panel {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255,255,255,0.92);
        border: 1px solid #ddd;
        border-radius: 16px;
        padding: 20px 24px;
        width: 420px;
        z-index: 10;
        font-family: sans-serif;
      }

      #input-panel textarea {
        width: 100%;
        height: 80px;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
        resize: none;
        box-sizing: border-box;
      }

      #input-panel button {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        background: #7ed9ed;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      #result {
        margin-top: 10px;
        font-size: 13px;
        color: #444;
        text-align: center;
        min-height: 18px;
      }

      #toggle-btn {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(126,217,237,0.9);
        border: none;
        font-size: 20px;
        cursor: pointer;
        z-index: 11;
        display: none;
      }

      #input-panel.collapsed {
        display: none;
      }

      #save-btn {
        position: fixed;
        bottom: 32px;
        right: 32px;
        padding: 10px 18px;
        background: rgba(126,217,237,0.9);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        z-index: 11;
        display: none;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="input-panel">
      <textarea id="convo-input" placeholder="Paste your AI conversation here..."></textarea>
      <button id="analyze-btn">Analyze Water Usage</button>
      <div id="result"></div>
    </div>
    <button id="toggle-btn">💧</button>
    <button id="save-btn" onclick="saveViz()">Save Image</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
